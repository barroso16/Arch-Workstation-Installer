# Arch Workstation Installer configuration.
#
# This file is sourced by the installer as trusted project configuration.
# Keep it as simple VARIABLE=value assignments only.
# Do not add Bash logic, command substitutions, functions, or spaces around =.

# Hostname assigned to the installed Arch Linux system.
HOSTNAME=arch-workstation

# Primary non-root user created during base configuration.
USERNAME=user

# System timezone. Must match a zone under /usr/share/zoneinfo.
TIMEZONE=America/Havana

# System locale generated and written to /etc/locale.conf.
LOCALE=en_US.UTF-8

# Console keymap written to /etc/vconsole.conf.
KEYMAP=us

# Target disk to erase and install onto.
# Leave empty to force interactive disk selection during Stage02.
TARGET_DISK=

# Size of the EFI System Partition.
EFI_SIZE=1G

# Name used for the opened LUKS mapper under /dev/mapper.
CRYPT_NAME=cryptroot

# Btrfs mount compression option.
BTRFS_COMPRESS=zstd

# Enable Secure Boot workflow in the dedicated Secure Boot stage.
ENABLE_SECURE_BOOT=yes

# Create sbctl Secure Boot keys if they do not already exist.
SBCTL_CREATE_KEYS=yes

# Enroll Microsoft Secure Boot keys together with local sbctl keys.
SBCTL_ENROLL_MICROSOFT_KEYS=no

# Install and use the base package profile.
PROFILE_BASE=yes

# Install and configure the desktop profile.
PROFILE_DESKTOP=yes

# Install development tools and language toolchains.
PROFILE_DEVELOPMENT=yes

# Install virtualization tooling such as QEMU and libvirt.
PROFILE_VIRTUALIZATION=yes

# Install printing support.
PROFILE_PRINTING=yes

# Install Bluetooth support.
PROFILE_BLUETOOTH=yes

# Install multimedia/audio support.
PROFILE_MULTIMEDIA=yes
